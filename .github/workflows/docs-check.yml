name: docs-check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-static-docs:
    name: validate-static-docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate documentation and static site files
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          required_files = [
              Path('.github/workflows/docs-check.yml'),
              Path('README.md'),
              Path('index.html'),
              Path('docs/STRUCTURE.md'),
              Path('docs/cyber-pinks-organization.svg'),
              Path('docs/neon-smil.svg'),
          ]

          errors = []
          for path in required_files:
              if not path.exists():
                  errors.append(f'Missing required file: {path}')

          markdown_files = [path for path in required_files if path.suffix == '.md' and path.exists()]
          for path in markdown_files:

              if path.read_text(encoding='utf-8').endswith('\n') is False:
                  errors.append(f'Missing trailing newline: {path}')

          for path in markdown_files:
              text = path.read_text(encoding='utf-8')
              for link in re.findall(r'\[[^\]]+\]\(([^)]+)\)', text):
                  if link.startswith(('http://', 'https://', '#', 'mailto:')):
                      continue

                  target = (path.parent / link).resolve()
                  if not target.exists():
                      errors.append(f'Broken relative Markdown link in {path}: {link}')


          html = Path('index.html')
          if html.exists():
              html_text = html.read_text(encoding='utf-8')
              for expected in ('downloadSVG', 'x-data', 'export-svg'):
                  if expected not in html_text:
                      errors.append(f'index.html is missing expected marker: {expected}')

          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)

          print('Documentation and static site checks passed.')
          PY