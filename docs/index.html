<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cyber Neon</title>
</head>
<body style="background:black; color:white; text-align:center; padding-top:50px;">

  <h1 style="color:hotpink;">Cyber Neon Text Generator</h1>

  <!-- Input Form -->
  <input id="textInput" type="text" placeholder="Enter text" 
         style="font-size:20px; padding:5px; width:300px;">
  
  <!-- SVG -->
  <svg id="neon" width="800" height="200">
    <text id="neonText" x="50" y="120" font-size="48" fill="hotpink">
      CYBER PINKS ORGANIZATION
    </text>
  </svg>

  <!-- JavaScript to update SVG text -->
  <script>
    const input = document.getElementById("textInput");
    const neonText = document.getElementById("neonText");

    input.addEventListener("input", () => {
      neonText.textContent = input.value;
    });
  </script>

</body>
</html>
