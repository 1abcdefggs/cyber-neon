<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CYBER-PINKS Neon Generator</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&family=VT323&family=Fira+Code:wght@400;700&family=Pixelify+Sans:wght@400;700&family=DotGothic16&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;700&family=Space+Mono&family=Electrolize&family=Syncopate:wght@400;700&family=Oxanium:wght@400;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    :root { --pink: #ff1493; --bg: #111; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #050505; color: white; text-align: center; font-family: 'Orbitron', sans-serif; padding: 20px; }

    .text-L { font-size: 2rem; font-weight: bold; }
    .text-M { font-size: 1.1rem; }
    .text-S { font-size: 0.9rem; font-weight: bold; color: var(--pink); text-transform: uppercase; }

    .layout-main { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; }
    .layout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: rgba(255, 20, 147, 0.05); padding: 30px; border: 2px solid var(--pink); border-radius: 12px; }
    .layout-col { display: flex; flex-direction: column; gap: 8px; text-align: left; }
    
    .ui-base { 
      width: 100%; 
      padding: 12px; 
      background: var(--bg); 
      color: white; 
      border: 1px solid var(--pink); 
      border-radius: 6px; 
      font-family: inherit; 
      outline: none; 
      transition: 0.3s; 
    }
    .ui-base:focus, .ui-base:hover { box-shadow: 0 0 10px var(--pink); background: #1a1a1a; }

    input[type="color"].ui-base { padding: 0; height: 48px; cursor: pointer; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }

    input[type="range"].ui-base { padding: 0; height: 8px; border: none; background: #222; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: var(--pink); border-radius: 50%; cursor: pointer; }
    
    button.ui-base { background: var(--pink); color: black; font-weight: bold; padding: 18px; cursor: pointer; }
    button.ui-base:hover { background: white; transform: translateY(-2px); }

    .preview-svg { border: 1px dashed rgba(255, 20, 147, 0.3); max-width: 100%; margin: 0 auto; display: block; }
  </style>
</head>

<body>

  <h1 class="text-L" style="color: var(--pink); text-shadow: 0 0 15px var(--pink); margin-bottom: 20px;">
    CYBER-PINKS Generator
  </h1>

  <div x-data="{
    text: 'CYBER NEON',
    fontSize: 64,
    color: '#ff1493',
    bgColor: '#000000',
    glow: 4,
    anim: 'flicker',
    selectedFont: '\'Press Start 2P\', cursive',
    fonts: [
      { name: 'Press Start 2P (8bit)', value: '\'Press Start 2P\', cursive' },
      { name: 'Orbitron (Cyber)', value: '\'Orbitron\', sans-serif' },
      { name: 'VT323 (Terminal)', value: '\'VT323\', monospace' },
      { name: 'Fira Code (Coding)', value: '\'Fira Code\', monospace' },
      { name: 'Pixelify Sans (Pixel)', value: '\'Pixelify Sans\', sans-serif' },
      { name: 'DotGothic16 (Dot)', value: '\'DotGothic16\', sans-serif' },
      { name: 'Space Grotesk', value: '\'Space Grotesk\', sans-serif' }
    ],
    downloadSVG() {
      const svgString = new XMLSerializer().serializeToString(document.getElementById('export-svg')).replace(/^<svg/, '<svg xmlns=\'http://www.w3.org/2000/svg\'');
      const link = document.createElement('a');
      link.href = URL.createObjectURL(new Blob([svgString], { type: 'image/svg+xml' }));
      link.download = 'cyber-readme.svg';
      link.click();
    }
  }" class="layout-main">

    <div class="layout-grid">
      <div class="layout-col">
        <label class="text-S">Font Family</label>
        <select class="ui-base text-M" x-model="selectedFont">
          <template x-for="f in fonts"><option :value="f.value" :style="'font-family:'+f.value" x-text="f.name"></option></template>
        </select>
      </div>
      <div class="layout-col">
        <label class="text-S">Font Size (px)</label>
        <input type="number" class="ui-base text-M" x-model="fontSize" min="10" max="200">
      </div>
      <div class="layout-col">
        <label class="text-S">Neon Color</label>
        <input type="color" class="ui-base" x-model="color">
      </div>
      <div class="layout-col">
        <label class="text-S">Background</label>
        <input type="color" class="ui-base" x-model="bgColor">
      </div>
      <div class="layout-col">
        <label class="text-S">Glow Power</label>
        <input type="range" class="ui-base" x-model="glow" min="0" max="20">
      </div>
      <div class="layout-col">
        <label class="text-S">Animation</label>
        <select class="ui-base text-M" x-model="anim">
          <option value="none">None</option>
          <option value="flicker">Flicker</option>
          <option value="glitch">Glitch</option>
          <option value="pulse">Pulse</option>
        </select>
      </div>
    </div>

    <div>
      <svg id="export-svg" class="preview-svg" width="900" height="250" viewBox="0 0 900 250">
        <defs>
          <filter id="neonGlow"><feGaussianBlur :stdDeviation="glow" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <style>
          @keyframes flicker { 0%,19%,21%,23%,25%,54%,56%,100% {opacity:1} 20%,24%,55% {opacity:.4} }
          @keyframes glitch { 0%,100%{transform:translate(0)} 20%,60%{transform:translate(-2px,2px)} 40%,80%{transform:translate(2px,-2px)} }
          @keyframes pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(2)} }
        </style>
        <rect width="100%" height="100%" :fill="bgColor" />
        <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" :font-size="fontSize" :fill="color" filter="url(#neonGlow)" :font-family="selectedFont" :style="anim !== 'none' ? `animation: ${anim} 1s infinite;` : ''" x-text="text"></text>
      </svg>
    </div>

    <div class="layout-col">
      <input type="text" class="ui-base text-L" style="border-width: 2px; text-align: center;" x-model="text" placeholder="TYPE HERE...">
      <button class="ui-base text-M text-L" @click="downloadSVG()">DOWNLOAD FOR README</button>
    </div>

  </div>

</body>
</html>
