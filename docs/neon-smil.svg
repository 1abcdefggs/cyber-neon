<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="800" height="160" viewBox="0 0 800 160"
     role="img" aria-label="Neon sample">
  <defs>
    <filter id="neonGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @media (prefers-reduced-motion: reduce) {
        .blink { animation: none; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#000"/>
  <text x="50%" y="55%" text-anchor="middle" font-family="sans-serif" font-size="36"
        fill="#ff66cc" stroke="#ff66cc" stroke-width="18" stroke-linejoin="round" stroke-opacity="0.15" filter="url(#neonGlow)">
    CYBER PINKS
  </text>
  <text x="50%" y="55%" text-anchor="middle" font-family="sans-serif" font-size="36"
        fill="#ff66cc" stroke="#ff66cc" stroke-width="1.5" stroke-linejoin="round">
    CYBER PINKS
    <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" repeatCount="indefinite"/>
  </text>
</svg>
